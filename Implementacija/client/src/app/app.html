<div
  [class]="isDark ? 'min-h-screen text-[#EDE0D0]' : 'min-h-screen text-[#2F241D]'"
  [style.background-color]="isDark ? '#352B22' : '#F5EFE7'"
  class="transition-colors duration-500"
>
  <!-- HEADER -->
  <header
    [style.background-color]="isDark ? '#3D3128' : '#FFF9F2'"
    [style.border-bottom]="isDark ? '1px solid #554536' : '1px solid #D7CABC'"
    [style.box-shadow]="isDark ? '0 4px 30px rgba(0,0,0,0.35)' : '0 4px 20px rgba(0,0,0,0.08)'"
    class="transition-all duration-300"
    style="padding: 16px 48px"
  >
    <div
      [style]="
        isLoggedIn
          ? 'display: flex; align-items: center; justify-content: space-between; gap: 32px; max-width: 1400px; margin: 0 auto;'
          : 'display: flex; align-items: center; justify-content: center; max-width: 1400px; margin: 0 auto;'
      "
    >
      <!-- LEFT: Logo -->
      @if (isLoggedIn) {
        <div style="display: flex; align-items: center; flex-shrink: 0">
          <a
            routerLink="/visualize"
            style="
              display: flex;
              align-items: center;
              gap: 12px;
              text-decoration: none;
              transition: opacity 0.2s;
            "
            onmouseover="this.style.opacity = '0.7'"
            onmouseout="this.style.opacity = '1'"
          >
            <svg style="width: 30px; height: 30px" viewBox="0 0 40 40" fill="none">
              <circle cx="8" cy="8" r="2.5" [attr.fill]="isDark ? '#554536' : '#D7CABC'" />
              <circle cx="20" cy="8" r="2.5" [attr.fill]="isDark ? '#554536' : '#D7CABC'" />
              <circle cx="32" cy="8" r="2.5" [attr.fill]="isDark ? '#554536' : '#D7CABC'" />
              <circle cx="8" cy="20" r="2.5" [attr.fill]="isDark ? '#554536' : '#D7CABC'" />
              <circle cx="20" cy="20" r="2.5" [attr.fill]="isDark ? '#554536' : '#D7CABC'" />
              <circle cx="32" cy="20" r="2.5" [attr.fill]="isDark ? '#554536' : '#D7CABC'" />
              <circle cx="8" cy="32" r="2.5" [attr.fill]="isDark ? '#554536' : '#D7CABC'" />
              <circle cx="20" cy="32" r="2.5" [attr.fill]="isDark ? '#554536' : '#D7CABC'" />
              <circle cx="32" cy="32" r="2.5" [attr.fill]="isDark ? '#554536' : '#D7CABC'" />
              <path
                d="M8 32 L8 20 L20 20 L20 8 L32 8"
                [attr.stroke]="isDark ? '#EDE0D0' : '#6E473B'"
                stroke-width="3"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
              <circle cx="8" cy="32" r="4" [attr.fill]="isDark ? '#EDE0D0' : '#6E473B'" />
              <circle cx="32" cy="8" r="4" [attr.fill]="isDark ? '#D3C3B0' : '#8B5E50'" />
            </svg>
            <span
              [style.color]="isDark ? '#EDE0D0' : '#6E473B'"
              style="
                font-family: 'Cormorant Garamond', serif;
                font-size: 26px;
                font-weight: 700;
                letter-spacing: -0.01em;
                line-height: 1;
              "
            >
              Pathfinder
            </span>
          </a>
        </div>
      }

      <!-- CENTER: Nav (natural flow = centered) -->
      @if (isLoggedIn) {
        <nav
          [style.background-color]="isDark ? '#2E241C' : '#EDE4D8'"
          [style.border]="isDark ? '1px solid #554536' : '1px solid #D7CABC'"
          [style.box-shadow]="isDark ? '0 2px 12px rgba(0,0,0,0.25)' : '0 2px 8px rgba(0,0,0,0.04)'"
          style="
            display: inline-flex;
            align-items: center;
            border-radius: 14px;
            padding: 5px;
            gap: 2px;
          "
        >
          <a
            routerLink="/visualize"
            routerLinkActive="active-pill"
            [routerLinkActiveOptions]="{ exact: false }"
            class="nav-pill"
            [style.color]="isDark ? '#D3C3B0' : '#6E5A4D'"
            style="
              padding: 10px 28px;
              border-radius: 10px;
              font-size: 14px;
              font-weight: 600;
              text-decoration: none;
              transition: all 0.2s;
            "
          >
            {{ i18n.t('nav.visualize') }}
          </a>
          <div
            [style.background-color]="isDark ? '#45352C' : '#D7CABC'"
            style="width: 1px; height: 20px; flex-shrink: 0"
          ></div>
          <a
            routerLink="/compare"
            routerLinkActive="active-pill"
            [routerLinkActiveOptions]="{ exact: false }"
            class="nav-pill"
            [style.color]="isDark ? '#D3C3B0' : '#6E5A4D'"
            style="
              padding: 10px 28px;
              border-radius: 10px;
              font-size: 14px;
              font-weight: 600;
              text-decoration: none;
              transition: all 0.2s;
            "
          >
            {{ i18n.t('nav.compare') }}
          </a>
          <div
            [style.background-color]="isDark ? '#45352C' : '#D7CABC'"
            style="width: 1px; height: 20px; flex-shrink: 0"
          ></div>
          <a
            routerLink="/playground"
            routerLinkActive="active-pill"
            [routerLinkActiveOptions]="{ exact: false }"
            class="nav-pill"
            [style.color]="isDark ? '#D3C3B0' : '#6E5A4D'"
            style="
              padding: 10px 28px;
              border-radius: 10px;
              font-size: 14px;
              font-weight: 600;
              text-decoration: none;
              transition: all 0.2s;
            "
          >
            {{ i18n.t('nav.playground') }}
          </a>
        </nav>
      }

      <!-- RIGHT -->
      <div
        [style]="
          isLoggedIn
            ? 'display: flex; align-items: center; gap: 10px; flex-shrink: 0;'
            : 'display: flex; align-items: center; gap: 10px;'
        "
      >
        <!-- Help -->
        @if (isLoggedIn) {
          <button
            (click)="helper.start()"
            [disabled]="isProfilePage"
            class="flex items-center gap-2 rounded-xl text-sm font-medium transition-all duration-200 hover:opacity-80 cursor-pointer disabled:opacity-40 disabled:cursor-not-allowed"
            [style.color]="isDark ? '#EDE0D0' : '#2F241D'"
            [style.background-color]="isDark ? '#2B211A' : '#EDE4D8'"
            [style.border]="isDark ? '1px solid #554536' : '1px solid #D7CABC'"
            [style.box-shadow]="
              isDark ? '0 2px 8px rgba(0,0,0,0.25)' : '0 2px 6px rgba(0,0,0,0.06)'
            "
            style="padding: 10px 16px"
            title="Help"
          >
            <svg
              style="width: 16px; height: 16px"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M8.228 9c.549-1.165 2.03-2 3.772-2 2.21 0 4 1.343 4 3 0 1.4-1.278 2.575-3.006 2.907-.542.104-.994.54-.994 1.093m0 3h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"
              />
            </svg>
            {{ i18n.t('header.help') }}
          </button>
        }

        <!-- Theme -->
        <button
          (click)="toggleTheme()"
          class="flex items-center gap-2 rounded-xl text-sm font-medium transition-all duration-200 hover:opacity-80 cursor-pointer"
          [style.color]="isDark ? '#EDE0D0' : '#2F241D'"
          [style.background-color]="isDark ? '#2B211A' : '#EDE4D8'"
          [style.border]="isDark ? '1px solid #554536' : '1px solid #D7CABC'"
          [style.box-shadow]="isDark ? '0 2px 8px rgba(0,0,0,0.25)' : '0 2px 6px rgba(0,0,0,0.06)'"
          style="padding: 10px 16px"
        >
          @if (isDark) {
            <svg
              style="width: 16px; height: 16px"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"
              />
            </svg>
          }
          @if (!isDark) {
            <svg
              style="width: 16px; height: 16px"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"
              />
            </svg>
          }
          {{ isDark ? i18n.t('header.dark') : i18n.t('header.light') }}
        </button>

        <!-- Language -->
        <button
          (click)="toggleLang()"
          class="flex items-center gap-2 rounded-xl text-sm font-medium transition-all duration-200 hover:opacity-80 cursor-pointer"
          [style.color]="isDark ? '#EDE0D0' : '#2F241D'"
          [style.background-color]="isDark ? '#2B211A' : '#EDE4D8'"
          [style.border]="isDark ? '1px solid #554536' : '1px solid #D7CABC'"
          [style.box-shadow]="isDark ? '0 2px 8px rgba(0,0,0,0.25)' : '0 2px 6px rgba(0,0,0,0.06)'"
          style="padding: 10px 16px"
        >
          <!-- Serbian flag -->
          @if (langLabel === 'EN') {
            <svg
              style="width: 20px; height: 14px; border-radius: 2px; flex-shrink: 0"
              viewBox="0 0 20 14"
            >
              <rect width="20" height="4.67" fill="#C6363C" />
              <rect y="4.67" width="20" height="4.67" fill="#0C4076" />
              <rect y="9.33" width="20" height="4.67" fill="#FFFFFF" />
            </svg>
          }
          <!-- British flag -->
          @if (langLabel !== 'EN') {
            <svg
              style="width: 20px; height: 14px; border-radius: 2px; flex-shrink: 0"
              viewBox="0 0 60 30"
            >
              <clipPath id="t"><rect width="60" height="30" /></clipPath>
              <g clip-path="url(#t)">
                <rect width="60" height="30" fill="#012169" />
                <path d="M0,0 L60,30 M60,0 L0,30" stroke="#fff" stroke-width="6" />
                <path
                  d="M0,0 L60,30 M60,0 L0,30"
                  stroke="#C8102E"
                  stroke-width="4"
                  clip-path="url(#t)"
                />
                <path d="M30,0 V30 M0,15 H60" stroke="#fff" stroke-width="10" />
                <path d="M30,0 V30 M0,15 H60" stroke="#C8102E" stroke-width="6" />
              </g>
            </svg>
          }
          {{ langLabel === 'EN' ? 'SR' : 'EN' }}
        </button>

        <!-- Profile (logged in) -->
        @if (isLoggedIn) {
          <a
            routerLink="/profile"
            class="profile-avatar"
            style="
              width: 40px;
              height: 40px;
              border-radius: 50%;
              overflow: hidden;
              display: block;
              transition: all 0.3s;
            "
            [style.border]="isDark ? '2px solid #554536' : '2px solid #D7CABC'"
            [style.box-shadow]="
              isDark ? '0 2px 10px rgba(0,0,0,0.3)' : '0 2px 8px rgba(0,0,0,0.06)'
            "
          >
            @if (user?.avatarUrl) {
              <img [src]="user!.avatarUrl" style="width: 100%; height: 100%; object-fit: cover" />
            }
            @if (!user?.avatarUrl) {
              <div
                style="
                  width: 100%;
                  height: 100%;
                  display: flex;
                  align-items: center;
                  justify-content: center;
                  font-size: 14px;
                  font-weight: 700;
                "
                [style.background-color]="isDark ? '#2E241C' : '#EDE4D8'"
                [style.color]="isDark ? '#AE9D8D' : '#8F7C6E'"
              >
                {{ user?.username?.charAt(0)?.toUpperCase() || '?' }}
              </div>
            }
          </a>
        }
      </div>
    </div>
  </header>

  <main class="animate-fade-in">
    <router-outlet />
  </main>
</div>

<app-helper-overlay></app-helper-overlay>

<style>
  .active-pill {
    background: linear-gradient(135deg, #6e473b, #8b5e50) !important;
    color: #f0e5d7 !important;
    box-shadow: 0 4px 15px rgba(110, 71, 59, 0.3);
    font-weight: 700 !important;
  }

  .nav-pill:not(.active-pill):hover {
    background-color: rgba(110, 71, 59, 0.1) !important;
    color: #6e473b !important;
    font-weight: 700 !important;
  }

  html.dark .nav-pill:not(.active-pill):hover {
    background-color: rgba(174, 157, 141, 0.12) !important;
    color: #ede0d0 !important;
  }

  .profile-avatar:hover {
    border-color: #8b5e50 !important;
    box-shadow:
      0 0 0 3px rgba(110, 71, 59, 0.2),
      0 4px 15px rgba(0, 0, 0, 0.15) !important;
    transform: scale(1.08);
  }
</style>
